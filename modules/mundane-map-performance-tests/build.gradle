import org.gradle.api.tasks.TaskAction
import org.gradle.work.DisableCachingByDefault

@DisableCachingByDefault(because = 'Verifies the configured task graph')
abstract class VerifyPerformanceLaneIsolation extends DefaultTask {
    @Input
    abstract ListProperty<String> getViolations()

    @TaskAction
    void verifyIsolation() {
        if (!violations.get().isEmpty()) {
            throw new GradleException(violations.get().join(System.lineSeparator()))
        }
    }
}

abstract class PerformanceScratchService implements
org.gradle.api.services.BuildService<org.gradle.api.services.BuildServiceParameters.None>,
AutoCloseable {
    private final Set<java.nio.file.Path> roots = java.util.concurrent.ConcurrentHashMap.newKeySet()

    synchronized void register(java.nio.file.Path root) {
        roots.add(root)
    }

    synchronized void cleanup(java.nio.file.Path root) {
        if (root == null || !roots.contains(root)) {
            return
        }
        deleteTree(root)
        roots.remove(root)
    }

    @Override
    void close() {
        List<java.nio.file.Path> remaining = roots.toList()
        Throwable primary = null
        remaining.each {
            try {
                cleanup(it)
            } catch (Throwable failure) {
                if (primary == null) {
                    primary = failure
                } else {
                    primary.addSuppressed(failure)
                }
            }
        }
        if (primary != null) {
            throw primary
        }
    }

    private static void deleteTree(java.nio.file.Path root) {
        if (!java.nio.file.Files.exists(root, java.nio.file.LinkOption.NOFOLLOW_LINKS)) {
            return
        }
        def paths = java.nio.file.Files.walk(root)
        try {
            paths.sorted(java.util.Comparator.reverseOrder()).forEach {
                java.nio.file.Files.deleteIfExists(it)
            }
        } finally {
            paths.close()
        }
    }
}

