def verifyPerformanceScratchBoundaries = tasks.register('verifyPerformanceScratchBoundaries') {
    group = 'verification'
    description = 'Exercises negative staging, report validation, and scratch-cleanup paths.'
    def scratchService = gradle.sharedServices.registerIfAbsent(
            'mundaneMapPerformanceScratch', PerformanceScratchService) {}
    usesService scratchService
    outputs.upToDateWhen { false }
    doLast {
        java.nio.file.Path temporaryRoot = java.nio.file.Path.of('/tmp')
                .toRealPath(java.nio.file.LinkOption.NOFOLLOW_LINKS)
        java.nio.file.Path scratch = java.nio.file.Files.createTempDirectory(
                temporaryRoot, 'mundane-map-boundary-test-')
        scratchService.get().register(scratch)
        try {
            java.nio.file.Path source = java.nio.file.Files.createDirectory(scratch.resolve('source'))
            java.nio.file.Path regular = java.nio.file.Files.writeString(
                    source.resolve('regular.txt'), 'runtime')
            java.nio.file.Files.createSymbolicLink(source.resolve('linked.txt'), regular)
            boolean runtimeLinkRejected = false
            try {
                stageRuntimeClasspath(scratch.resolve('runtime'), [source.toFile()])
            } catch (GradleException expected) {
                if (!expected.message.contains('symbolic link')) {
                    throw expected
                }
                runtimeLinkRejected = true
            }
            if (!runtimeLinkRejected) {
                throw new GradleException('Runtime staging accepted a linked classpath entry')
            }

            java.nio.file.Path output = java.nio.file.Files.createDirectory(scratch.resolve('output'))
            java.nio.file.Files.writeString(output.resolve('evidence-v1.json'), '{}')
            java.nio.file.Path buildRoot = java.nio.file.Files.createDirectory(scratch.resolve('build'))
            try {
                publishEvidenceReports(output, buildRoot.resolve('performance-negative'), buildRoot)
                throw new GradleException('Expected report publication to reject a missing report')
            } catch (GradleException expected) {
                if (!expected.message.contains('missing or unsafe')) {
                    throw expected
                }
            }

            java.nio.file.Path outside = java.nio.file.Files.writeString(
                    scratch.resolve('outside.md'), 'outside')
            java.nio.file.Files.createSymbolicLink(output.resolve('evidence-v1.md'), outside)
            try {
                publishEvidenceReports(output, buildRoot.resolve('performance-negative'), buildRoot)
                throw new GradleException('Expected report publication to reject a linked report')
            } catch (GradleException expected) {
                if (!expected.message.contains('missing or unsafe')) {
                    throw expected
                }
            }
        } finally {
            scratchService.get().cleanup(scratch)
        }
        if (java.nio.file.Files.exists(scratch, java.nio.file.LinkOption.NOFOLLOW_LINKS)) {
            throw new GradleException('Negative performance scratch was not cleaned')
        }
    }
}

tasks.named('check') {
