def requireNoSymlinkComponents = { java.nio.file.Path candidate, String label ->
    java.nio.file.Path absolute = candidate.toAbsolutePath().normalize()
    java.nio.file.Path cursor = absolute.root
    for (java.nio.file.Path component : absolute) {
        cursor = cursor.resolve(component)
        if (java.nio.file.Files.isSymbolicLink(cursor)) {
            throw new GradleException("${label} traverses a symbolic link: ${cursor}")
        }
    }
}

def stageRuntimeClasspath = { java.nio.file.Path runtime, Iterable<File> original ->
    java.nio.file.Files.createDirectory(runtime)
    List<File> entries = original.toList()
    List<File> staged = []
    entries.eachWithIndex { File entryFile, int index ->
        java.nio.file.Path declared = entryFile.toPath().toAbsolutePath().normalize()
        if (!java.nio.file.Files.exists(declared, java.nio.file.LinkOption.NOFOLLOW_LINKS)) {
            return
        }
        requireNoSymlinkComponents(declared, 'Performance runtime entry')
        java.nio.file.Path source = declared.toRealPath(java.nio.file.LinkOption.NOFOLLOW_LINKS)
        if (source != declared) {
            throw new GradleException("Performance runtime entry traverses a symbolic link: ${declared}")
        }
        java.nio.file.Path target = runtime.resolve(String.format('%03d-entry', index)).normalize()
        if (!target.startsWith(runtime)) {
            throw new GradleException('Performance runtime staging escaped its scratch directory')
        }
        if (java.nio.file.Files.isDirectory(source, java.nio.file.LinkOption.NOFOLLOW_LINKS)) {
            java.nio.file.Files.createDirectory(target)
            def paths = java.nio.file.Files.walk(source)
            try {
                for (java.nio.file.Path path : paths.sorted().toList()) {
                    if (java.nio.file.Files.isSymbolicLink(path)) {
                        throw new GradleException(
                        "Performance runtime contains a symbolic link: ${path}")
                    }
                    java.nio.file.Path relative = source.relativize(path)
                    java.nio.file.Path destination = target.resolve(relative).normalize()
                    if (!destination.startsWith(target)) {
                        throw new GradleException(
                        'Performance runtime entry escaped its staged directory')
                    }
                    if (java.nio.file.Files.isDirectory(
                            path, java.nio.file.LinkOption.NOFOLLOW_LINKS)) {
                        java.nio.file.Files.createDirectories(destination)
                    } else if (java.nio.file.Files.isRegularFile(
                            path, java.nio.file.LinkOption.NOFOLLOW_LINKS)) {
                        java.nio.file.Files.copy(path, destination)
                    } else {
                        throw new GradleException(
                        "Unsupported performance runtime entry: ${path}")
                    }
                }
            } finally {
                paths.close()
            }
        } else if (java.nio.file.Files.isRegularFile(
                source, java.nio.file.LinkOption.NOFOLLOW_LINKS)) {
            java.nio.file.Files.copy(source, target)
        } else {
            throw new GradleException("Unsupported performance runtime entry: ${source}")
        }
        staged.add(target.toFile())
    }
    if (staged.isEmpty()) {
        throw new GradleException('Performance runtime classpath is empty')
    }
    staged
}

def publishEvidenceReports = { java.nio.file.Path scratchOutput, java.nio.file.Path destinationPath, java.nio.file.Path configuredBuildRoot ->
    java.nio.file.Path output = scratchOutput.toRealPath(java.nio.file.LinkOption.NOFOLLOW_LINKS)
    if (java.nio.file.Files.isSymbolicLink(scratchOutput)
            || !java.nio.file.Files.isDirectory(
            output, java.nio.file.LinkOption.NOFOLLOW_LINKS)) {
        throw new GradleException('Performance scratch output is not a real directory')
    }
    List<String> names = [
        'evidence-v1.json',
        'evidence-v1.md'
    ]
    List<java.nio.file.Path> sources = names.collect { String name ->
        java.nio.file.Path source = output.resolve(name).normalize()
        if (!source.startsWith(output)
                || java.nio.file.Files.isSymbolicLink(source)
                || !java.nio.file.Files.isRegularFile(
                source, java.nio.file.LinkOption.NOFOLLOW_LINKS)
                || source.toRealPath(java.nio.file.LinkOption.NOFOLLOW_LINKS).parent != output
                || java.nio.file.Files.size(source) <= 0
                || java.nio.file.Files.size(source) > 16L * 1_024L * 1_024L) {
            throw new GradleException("Performance report is missing or unsafe: ${name}")
        }
        source
    }

    java.nio.file.Path buildRoot = configuredBuildRoot
    requireNoSymlinkComponents(buildRoot, 'Root build directory')
    java.nio.file.Files.createDirectories(buildRoot)
    if (java.nio.file.Files.isSymbolicLink(buildRoot)) {
        throw new GradleException('Root build directory must not be a symbolic link')
    }
    java.nio.file.Path realBuildRoot = buildRoot.toRealPath(
            java.nio.file.LinkOption.NOFOLLOW_LINKS)
    java.nio.file.Path declaredDestination = destinationPath.toAbsolutePath().normalize()
    if (!declaredDestination.startsWith(buildRoot)) {
        throw new GradleException('Performance report destination escaped the root build directory')
    }
    requireNoSymlinkComponents(declaredDestination, 'Performance report destination')
    java.nio.file.Files.createDirectories(declaredDestination)
    if (java.nio.file.Files.isSymbolicLink(declaredDestination)) {
        throw new GradleException('Performance report destination must not be a symbolic link')
    }
    java.nio.file.Path destination = declaredDestination.toRealPath(
            java.nio.file.LinkOption.NOFOLLOW_LINKS)
    if (!destination.startsWith(realBuildRoot)) {
        throw new GradleException('Performance report destination resolved outside the build directory')
    }

    String destinationName = destination.fileName.toString()
    if (!(destinationName ==~ /[a-z][a-z0-9-]{0,63}/)) {
        throw new GradleException('Performance report destination name is unsafe')
    }
    java.nio.file.Path lockPath = realBuildRoot.resolve(
            ".${destinationName}.publish.lock").normalize()
    if (!lockPath.startsWith(realBuildRoot)) {
        throw new GradleException('Performance report lock escaped the build directory')
    }
    if (java.nio.file.Files.isSymbolicLink(lockPath)) {
        throw new GradleException('Performance report lock must not be a symbolic link')
    }
    def channel = java.nio.channels.FileChannel.open(
            lockPath,
            java.nio.file.StandardOpenOption.CREATE,
            java.nio.file.StandardOpenOption.WRITE)
    def lock = null
    try {
        lock = channel.lock()
        List<java.nio.file.Path> temporaries = []
        try {
            sources.eachWithIndex { java.nio.file.Path source, int index ->
                java.nio.file.Path temporary = java.nio.file.Files.createTempFile(
                        destination, ".${names[index]}-", '.tmp')
                temporaries.add(temporary)
                java.nio.file.Files.copy(
                        source, temporary, java.nio.file.StandardCopyOption.REPLACE_EXISTING)
                def report = java.nio.channels.FileChannel.open(
                        temporary, java.nio.file.StandardOpenOption.WRITE)
                try {
                    report.force(true)
                } finally {
                    report.close()
                }
            }
            temporaries.eachWithIndex { java.nio.file.Path temporary, int index ->
                java.nio.file.Path target = destination.resolve(names[index]).normalize()
                if (!target.startsWith(destination)) {
                    throw new GradleException('Performance report target escaped its destination')
                }
                java.nio.file.Files.move(
                        temporary,
                        target,
                        java.nio.file.StandardCopyOption.ATOMIC_MOVE,
                        java.nio.file.StandardCopyOption.REPLACE_EXISTING)
            }
        } finally {
            temporaries.each { java.nio.file.Files.deleteIfExists(it) }
        }
    } finally {
        if (lock != null) {
            lock.release()
        }
        channel.close()
    }
}

def configureNativeEvidenceExecution = { TaskProvider<Exec> provider, Provider<org.gradle.api.file.Directory> destination, String label, Map<String, String> evidenceProperties ->
    def originalClasspath = sourceSets.main.runtimeClasspath
    def scratchService = gradle.sharedServices.registerIfAbsent(
            'mundaneMapPerformanceScratch', PerformanceScratchService) {}
    provider.configure {
        ext.performanceScratch = null
        usesService scratchService
        inputs.files(originalClasspath)
                .withPropertyName("${label}UnstagedRuntimeClasspath")
                .withPathSensitivity(PathSensitivity.RELATIVE)
        inputs.properties(evidenceProperties)
        inputs.property('performanceJvmArguments', evidenceJvmArguments)
        outputs.files(
                destination.map { it.file('evidence-v1.json') },
                destination.map { it.file('evidence-v1.md') })
        outputs.upToDateWhen { false }
        doFirst {
            java.nio.file.Path temporaryRoot = java.nio.file.Path.of('/tmp')
                    .toAbsolutePath().normalize()
            requireNoSymlinkComponents(temporaryRoot, 'Performance scratch root')
            if (java.nio.file.Files.isSymbolicLink(temporaryRoot)
                    || !java.nio.file.Files.isDirectory(
                    temporaryRoot, java.nio.file.LinkOption.NOFOLLOW_LINKS)) {
                throw new GradleException('/tmp must be a real directory for performance evidence')
            }
            temporaryRoot = temporaryRoot.toRealPath(java.nio.file.LinkOption.NOFOLLOW_LINKS)
            java.nio.file.Path created = java.nio.file.Files.createTempDirectory(
                    temporaryRoot, "mundane-map-${label}-")
            ext.performanceScratch = created
            scratchService.get().register(created)
            java.nio.file.Path scratch = created.toRealPath(
                    java.nio.file.LinkOption.NOFOLLOW_LINKS)
            if (scratch.parent != temporaryRoot || java.nio.file.Files.isSymbolicLink(scratch)) {
                scratchService.get().cleanup(scratch)
                ext.performanceScratch = null
                throw new GradleException('Performance scratch directory is unsafe')
            }
            ext.performanceScratch = scratch
            java.nio.file.Path work = java.nio.file.Files.createDirectory(scratch.resolve('work'))
            java.nio.file.Path output = java.nio.file.Files.createDirectory(scratch.resolve('output'))
            java.nio.file.Path temporary = java.nio.file.Files.createDirectory(scratch.resolve('tmp'))
            java.nio.file.Path runtime = scratch.resolve('runtime')
            List<File> stagedClasspath = stageRuntimeClasspath(runtime, originalClasspath.files)
            List<String> javaArguments = new ArrayList<>(evidenceJvmArguments)
            evidenceProperties.each { String key, String value ->
                javaArguments.add("-D${key}=${value}")
            }
            javaArguments.add("-DperformanceOutput=${output}")
            javaArguments.add("-Djava.io.tmpdir=${temporary}")
            javaArguments.add('-cp')
            javaArguments.add(stagedClasspath.collect { it.absolutePath }.join(File.pathSeparator))
            javaArguments.add('io.github.mundanej.map.performance.PerformanceEvidenceMain')
            executable = java21Launcher.get().executablePath.asFile
            args = javaArguments
            workingDir work.toFile()
        }
        doLast {
            java.nio.file.Path scratch = ext.performanceScratch
            Throwable primary = null
            try {
                publishEvidenceReports(
                        scratch.resolve('output'),
                        destination.get().asFile.toPath(),
                        rootBuildPath)
            } catch (Throwable failure) {
                primary = failure
                throw failure
            } finally {
                try {
                    scratchService.get().cleanup(scratch)
                    ext.performanceScratch = null
                } catch (Throwable cleanupFailure) {
                    if (primary == null) {
                        throw cleanupFailure
                    }
                    primary.addSuppressed(cleanupFailure)
                }
            }
        }
    }
}

configureNativeEvidenceExecution(
