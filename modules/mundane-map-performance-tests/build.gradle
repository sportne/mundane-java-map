tasks.withType(Test).configureEach {
    javaLauncher = java21Launcher
}

def verifyBaselineOracle = tasks.register('verifyBaselineOracle', Test) {
    group = 'verification'
    description = 'Independently verifies the frozen BASELINE semantic observations.'
    dependsOn tasks.named('testClasses')
    testClassesDirs = sourceSets.test.output.classesDirs
    classpath = sourceSets.test.runtimeClasspath
    filter {
        includeTestsMatching(
                'io.github.mundanej.map.performance.IndependentProfileOracleTest.baselineDigestsComeFromIndependentProfileFixturesAndPublicPaths')
        includeTestsMatching(
                'io.github.mundanej.map.performance.ScreenGeometryWorkOracleTest.baselineFrozenWorkCountersMatchTheIndependentReference')
        includeTestsMatching(
                'io.github.mundanej.map.performance.ScreenGeometryWorkOracleTest.baselineProductionCaptureMatchesTheFrozenWorkCounters')
        includeTestsMatching(
                'io.github.mundanej.map.performance.DtedBaselineFixtureTest.maximumFixtureHasPinnedHeadersRecordsAndPublicReaderBehavior')
    }
    systemProperty 'performanceBaselineOracle', 'true'
    systemProperty 'performanceProfile', 'BASELINE'
    minHeapSize = '512m'
    maxHeapSize = '512m'
    jvmArgs evidenceJvmArguments.drop(2)
    reports.html.outputLocation = layout.buildDirectory.dir('reports/tests/baselineOracle')
    reports.junitXml.outputLocation = layout.buildDirectory.dir('test-results/baselineOracle')
    binaryResultsDirectory = layout.buildDirectory.dir('test-results/baselineOracle/binary')
}

def commonEvidence = { RunPerformanceEvidence task, String prefix, def output ->
    task.dependsOn tasks.named('classes')
    task.runtimeClasspath.from(sourceSets.main.runtimeClasspath)
    task.javaExecutable = java21Launcher.map { it.executablePath }
    task.jvmArguments = evidenceJvmArguments
    task.programArguments = []
    task.expectedReports = reportNames
    task.allowedScenarios = []
    task.scratchPrefix = "mundane-map-${prefix}-"
    task.outputDirectory = output
    task.outputs.upToDateWhen { false }
}

def runDtedMemoryProbe = tasks.register('runDtedMemoryProbe', RunPerformanceEvidence) {
    group = 'verification'
    description = 'Captures labelled JVM observations for maximum eager DTED publication.'
    commonEvidence(delegate, 'dted-probe', probeDirectory)
    systemProperties = [:]
    programArguments = ['--dted-memory-probe']
    expectedReports = ['dted-memory-probe-v1.json']
}

def dtedInputs = [
    'performanceDtedCorpus.l0': rootProject.file(
    'modules/mundane-map-io-dted/src/dtedCorpusTest/resources/dted-corpus/data/gdal-zone-v-l0-complete/w001/s81.dt0'),
    'performanceDtedCorpus.l1': rootProject.file(
    'modules/mundane-map-io-dted/src/dtedCorpusTest/resources/dted-corpus/data/gdal-zone-v-l1-complete/w001/s81.dt1'),
    'performanceDtedCorpus.l2': rootProject.file(
    'modules/mundane-map-io-dted/src/dtedCorpusTest/resources/dted-corpus/data/gdal-zone-v-l2-partial/w001/s81.dt2'),
    'performanceDtedProbe': probeDirectory.get().file('dted-memory-probe-v1.json').asFile
].asImmutable()
def fullProperties = [performanceProfile: 'BASELINE']
[
    'performanceScenario',
    'performanceWarmups',
    'performanceMeasurements',
    'performanceRevision'
].each { name ->
    if (providers.gradleProperty(name).isPresent()) {
        fullProperties[name] = providers.gradleProperty(name).get()
    }
}
if (!fullProperties.containsKey('performanceRevision')
        && providers.environmentVariable('GITHUB_SHA').isPresent()) {
    fullProperties.GITHUB_SHA = providers.environmentVariable('GITHUB_SHA').get()
}

tasks.register('runPerformanceEvidence', RunPerformanceEvidence) {
    group = 'verification'
    description = 'Runs the full deterministic performance-evidence profile.'
    commonEvidence(delegate, 'full', evidenceDirectory)
    dependsOn verifyBaselineOracle, runDtedMemoryProbe
    systemProperties = fullProperties
    stagedInputs = dtedInputs.collectEntries { name, file ->
        [(name): file.absolutePath]
    }
    stagedInputFiles.from(dtedInputs.values())
}

def quickProperties = [
    performanceProfile: 'SMOKE',
    performanceWarmups: '1',
    performanceMeasurements: '2'
]
if (providers.gradleProperty('performanceScenario').isPresent()) {
    quickProperties.performanceScenario = providers.gradleProperty('performanceScenario').get()
}
tasks.register('runQuickPerformanceEvidence', RunPerformanceEvidence) {
    group = 'verification'
    description = 'Runs the fixed noncanonical SMOKE profile for quick iteration.'
    commonEvidence(delegate, 'quick', quickEvidenceDirectory)
    systemProperties = quickProperties
}

def selectedJfrScenario = providers.gradleProperty('performanceScenario')
def jfrRecordingName = selectedJfrScenario.map { scenario -> "${scenario}.jfr" }
def jfrDirectory = selectedJfrScenario.map { scenario ->
    rootProject.layout.buildDirectory.dir("performance-evidence/jfr/${scenario}").get()
}
def cleanPerformanceJfrOutput = tasks.register('cleanPerformanceJfrOutput', Delete) {
    delete jfrDirectory
}
def recordPerformanceJfr = tasks.register('recordPerformanceJfr', RunPerformanceEvidence) {
    group = 'verification'
    description = 'Records one selected performance scenario with Java 21 JFR.'
    commonEvidence(delegate, 'jfr', jfrDirectory)
    dependsOn cleanPerformanceJfrOutput
    systemProperties = selectedJfrScenario.map { scenario ->
        [
            performanceProfile: 'BASELINE',
            performanceWarmups: '1',
            performanceMeasurements: '2',
            performanceScenario: scenario
        ]
    }
    allowedScenarios = evidenceScenarioIds
    jvmArguments.add(jfrRecordingName.map { recording ->
        "-XX:StartFlightRecording=filename=@OUTPUT@/${recording},settings=profile,dumponexit=true,disk=true,maxsize=512m,jdk.ObjectAllocationSample#enabled=true"
    })
    expectedReports.add(jfrRecordingName)
}

tasks.register('performanceJfr') {
    group = 'verification'
    description = 'Records and summarizes one selected Java 21 performance flight recording.'
    dependsOn recordPerformanceJfr
    def summary = jfrDirectory.map { it.file('summary.txt') }
    def events = jfrDirectory.map { it.file('events.txt') }
    outputs.files(summary, events)
    doLast {
        File jfr = java21Launcher.get().metadata.installationPath.file(
                System.getProperty('os.name').startsWith('Windows')
                ? 'bin/jfr.exe' : 'bin/jfr').asFile
        File recording = jfrDirectory.get().file(jfrRecordingName.get()).asFile
        [
            [
                [
                    'summary',
                    recording.absolutePath
                ],
                summary.get().asFile
            ],
            [
                [
                    'print',
                    '--events',
                    'jdk.ExecutionSample,jdk.ObjectAllocationSample,jdk.ObjectAllocationInNewTLAB,jdk.ObjectAllocationOutsideTLAB,jdk.FileRead,jdk.FileWrite',
                    recording.absolutePath
                ],
                events.get().asFile
            ]
        ].each { command, output ->
            output.parentFile.mkdirs()
            def process = new ProcessBuilder([jfr.absolutePath] + command)
            .redirectOutput(output)
            .redirectError(ProcessBuilder.Redirect.INHERIT)
            .start()
            if (process.waitFor() != 0) {
                throw new GradleException("JFR inspection failed: ${command[0]}")
            }
        }
    }
}

