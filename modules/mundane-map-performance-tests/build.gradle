    mainClass = 'io.github.mundanej.map.performance.AuthorRasterResources'
    javaLauncher = java21Launcher
    args layout.projectDirectory.dir(
            'src/main/resources/io/github/mundanej/map/performance/fixture/raster-1024x768-v1')
            .asFile.absolutePath
}

def verifyPerformanceLaneIsolation = tasks.register(
        'verifyPerformanceLaneIsolation', VerifyPerformanceLaneIsolation) {
            group = 'verification'
            description = 'Proves the full, quick, and JFR evidence tasks stay outside other lanes.'
            violations.convention([])
        }

gradle.projectsEvaluated {
    def violations = []
    Task full = runPerformanceEvidence.get()
    Task quick = runQuickPerformanceEvidence.get()
    Task jfr = tasks.named('performanceJfr').get()
    Set<Task> owned =
            [
                full,
                quick,
                verifyBaselineOracle.get(),
                jfr,
                performanceJfrSummary.get(),
                performanceJfrEvents.get()
            ] as Set
    def resolveDependencyNotation
    resolveDependencyNotation = { owner, notation, resolved ->
        if (notation == null) {
            return
        }
        if (notation instanceof Task) {
            resolved.add(notation)
            return
        }
        if (notation instanceof org.gradle.api.tasks.TaskReference) {
            resolved.add(owner.project.tasks.getByPath(notation.name))
            return
        }
        if (notation instanceof Buildable) {
            notation.buildDependencies.getDependencies(owner).each { resolved.add(it) }
            return
        }
        if (notation instanceof Provider) {
            resolveDependencyNotation(owner, notation.get(), resolved)
            return
        }
        if (notation instanceof CharSequence) {
            resolved.add(owner.project.tasks.getByPath(notation.toString()))
            return
        }
        if (notation instanceof Map) {
            notation.values().each { resolveDependencyNotation(owner, it, resolved) }
            return
        }
        if (notation instanceof Iterable) {
            notation.each { resolveDependencyNotation(owner, it, resolved) }
            return
        }
        if (notation.getClass().isArray()) {
            notation.each { resolveDependencyNotation(owner, it, resolved) }
            return
        }
        if (notation instanceof Closure) {
            def value = notation.maximumNumberOfParameters == 0
                    ? notation.call()
                    : notation.call(owner)
            resolveDependencyNotation(owner, value, resolved)
            return
        }
        if (notation instanceof java.util.concurrent.Callable) {
            resolveDependencyNotation(owner, notation.call(), resolved)
            return
        }
        throw new GradleException(
        "Unsupported task dependency notation on ${owner.path}: ${notation.getClass().name}")
    }
    def declaredDependencies = { owner ->
        Set<Task> resolved = [] as Set
        owner.getDependsOn().each { notation ->
            resolveDependencyNotation(owner, notation, resolved)
        }
        resolved
    }
    def dependencyClosure = { Task root ->
        Set<Task> visited = [] as Set
        List<Task> pending = [root]
        while (!pending.isEmpty()) {
            Task current = pending.remove(pending.size() - 1)
            declaredDependencies(current).each { dependency ->
                if (visited.add(dependency)) {
                    pending.add(dependency)
                }
            }
        }
        visited
    }
    [
        'checkAll',
        'qualityGate',
        'nativeSmoke',
        'shapefileCorpus',
        'renderRegression',
        'publicationDryRun',
        'consumerSmoke'
    ].each { taskName ->
        Task lane = rootProject.tasks.findByName(taskName)
        if (lane != null) {
            Set<String> leaks = dependencyClosure(lane)
                    .findAll { owned.contains(it) }
                    .collect { it.path } as Set
            if (!leaks.isEmpty()) {
                violations.add(
                        "Performance evidence tasks leaked into ${lane.path}: ${leaks.sort()}")
            }
        }
    }
    Task rootEvidence = rootProject.tasks.named('performanceEvidence').get()
    Set<String> direct = declaredDependencies(rootEvidence)
            .collect { it.path } as Set
    if (direct != ([full.path] as Set)) {
        violations.add(
                "performanceEvidence must depend only on ${full.path}; found ${direct.sort()}")
    }
    Task rootQuick = rootProject.tasks.named('performanceQuick').get()
    Set<String> quickDirect = declaredDependencies(rootQuick)
            .collect { it.path } as Set
    if (quickDirect != ([quick.path] as Set)) {
        violations.add(
                "performanceQuick must depend only on ${quick.path}; found ${quickDirect.sort()}")
    }
    Set<String> quickDependencies = dependencyClosure(quick).collect { it.path } as Set
    if (quickDependencies.contains(verifyBaselineOracle.get().path)) {
        violations.add('runQuickPerformanceEvidence must not depend on verifyBaselineOracle')
    }
    if (quickDependencies.contains(full.path)) {
        violations.add('runQuickPerformanceEvidence must not depend on runPerformanceEvidence')
    }
    Set<String> fullDependencies = dependencyClosure(full).collect { it.path } as Set
    if (fullDependencies.contains(quick.path)) {
        violations.add('runPerformanceEvidence must not depend on runQuickPerformanceEvidence')
    }
    verifyPerformanceLaneIsolation.configure {
        it.violations.set(violations.unique().sort())
    }
}

tasks.named('check') {
    dependsOn verifyPerformanceLaneIsolation
}
