plugins {
    id 'maven-publish'
}

tasks.withType(Javadoc).configureEach {
    options.encoding = 'UTF-8'
    options.charSet = 'UTF-8'
    options.docEncoding = 'UTF-8'
    options.addBooleanOption('Xdoclint:all', true)
    options.addBooleanOption('Werror', true)
    options.addBooleanOption('notimestamp', true)
}

def publicApiCheck = tasks.register('checkstylePublicApi', Checkstyle) {
    group = 'verification'
    description = 'Checks published main-source declarations for complete public API documentation.'
    source = sourceSets.main.allJava
    classpath = files()
    configFile = rootProject.file('config/checkstyle/checkstyle-public-api.xml')
}

tasks.named('check') {
    dependsOn publicApiCheck
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
            pom {
                name.set(providers.provider { project.name })
                description.set(providers.provider { project.description ?: project.name })
                url.set('https://github.com/sportne/mundane-java-map')
                licenses {
                    license {
                        name = 'BSD 3-Clause License'
                        url = 'https://opensource.org/license/bsd-3-clause'
                    }
                }
                developers {
                    developer {
                        id = 'sportne'
                    }
                }
                scm {
                    url = 'https://github.com/sportne/mundane-java-map'
                }
            }
        }
    }
    repositories {
        maven {
            name = 'releaseDryRun'
            url = rootProject.layout.buildDirectory.dir('release-dry-run/maven')
        }
    }
}
