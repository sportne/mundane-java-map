        ['check', 'spotlessCheck', 'javadoc'].each { taskName ->
            Task candidate = auditedProject.tasks.findByName(taskName)
            if (candidate != null) auditedRootPaths.add(candidate.path)
        }
        auditedProject.tasks.matching { task -> task.group == 'publishing' }.each {
            auditedRootPaths.add(it.path)
        }
