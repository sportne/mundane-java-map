    Set<String> graphPaths = graph.allTasks.collect { it.path } as Set
    List<String> violations = []
    if (graphPaths.contains(tasks.named('dtedCorpus').get().path)
            && !graphPaths.containsAll(ownedPaths)) {
        violations.add(
                "DTED corpus task-graph calibration failed: ${graphPaths.intersect(ownedPaths).sort()}")
    }
    Set<String> reachedAuditedRoots = graphPaths.intersect(auditedRootPaths)
    Set<String> reachedOwnedTasks = graphPaths.intersect(ownedPaths)
    if (!reachedAuditedRoots.isEmpty() && !reachedOwnedTasks.isEmpty()) {
        reachedAuditedRoots.each { rootPath ->
            violations.add("DTED corpus tasks ${reachedOwnedTasks.sort()} leaked into ${rootPath}")
        }
    }
    if (!violations.isEmpty()) {
        throw new GradleException(violations.unique().sort().join(System.lineSeparator()))
    }
    verifyDtedCorpusIsolation.configure {
        it.violations.set([])
    }
}

tasks.register('primeDtedCorpusDependencies') {
    group = 'build setup'
    description = 'Resolves every dependency needed by the offline DTED corpus lane.'
    dependsOn ':modules:mundane-map-io-dted:primeDtedCorpusDependenciesInternal'
}

tasks.register('cleanReleaseDryRun', Delete) {
    group = 'publishing'
    delete layout.buildDirectory.dir('release-dry-run')
    delete layout.buildDirectory.dir('release-evidence')
    mustRunAfter tasks.named('clean')
}

def publishedReleaseContract = [
    'mundane-map-api|||io/github/mundanej/map/api/|Public geometry, feature, layer, projection, style, and event contracts.',
    'mundane-map-core|mundane-map-api||io/github/mundanej/map/core/|JDK-only viewport, projection, layer, and geometry support.',
    'mundane-map-awt|mundane-map-api,mundane-map-core||io/github/mundanej/map/awt/|Swing and Java2D map component.',
    'mundane-map-io-shapefile|mundane-map-api|mundane-map-core|io/github/mundanej/map/io/shapefile/|JDK-only read-only ESRI Shapefile support.',
    'mundane-map-io-image|mundane-map-api|mundane-map-core|io/github/mundanej/map/io/image/|Bounded toolkit-neutral PNG and JPEG raster sources.',
    'mundane-map-io-dted|mundane-map-api|mundane-map-core|io/github/mundanej/map/io/dted/|JDK-only read-only DTED elevation support.'
]
def releaseProjectByArtifact = publishedProjects.collectEntries { projectPath ->
    [(project(projectPath).name): projectPath]
}
def contractArtifacts = publishedReleaseContract.collect { it.split('\\|', -1)[0] }
if (releaseProjectByArtifact.keySet() != (contractArtifacts as Set)) {
    throw new GradleException(
            "Published release contract mismatch: inventory ${releaseProjectByArtifact.keySet().sort()}, "
                    + "contract ${contractArtifacts.sort()}")
}
def publicationTaskPaths = contractArtifacts.collect { artifact ->
    "${releaseProjectByArtifact.get(artifact)}:publishMavenJavaPublicationToReleaseDryRunRepository"
}

def stageReleaseDryRun = tasks.register('stageReleaseDryRun') {
    group = 'publishing'
    description = 'Writes the published Maven modules in deterministic inventory order.'
    dependsOn publicationTaskPaths
}

tasks.register('publicationDryRun') {
    group = 'publishing'
    description = 'Stages and verifies published modules in a local Maven repository.'
    dependsOn 'testPublicationDryRunVerifier'
    dependsOn 'testPublicationDryRunFunctional'
}

tasks.register(
        'testPublicationDryRunVerifier',
        TestPublicationDryRunVerifier) {
    group = 'verification'
    description = 'Proves publication verification rejects stale and unexpected files.'
    dependsOn 'verifyPublicationDryRun'
    repositoryDirectory = layout.buildDirectory.dir('release-dry-run/maven')
    releaseContract = publishedReleaseContract
    publicationVersion = project.version.toString()
    licenseFile = layout.projectDirectory.file('LICENSE')
}

tasks.register('testPublicationDryRunFunctional', TestPublicationDryRunFunctional) {
    group = 'verification'
    description = 'Proves parallel repeat staging cleanup and literal-release verification.'
    mustRunAfter tasks.named('testPublicationDryRunVerifier')
    sourceDirectory = layout.projectDirectory
    gradleUserHome = gradle.gradleUserHomeDir
    gradleExecutable = new File(gradle.gradleHomeDir, 'bin/gradle').absolutePath
    javaHome = System.getProperty('java.home')
    scratchDirectory = layout.buildDirectory.dir('publication-functional')
    outputs.upToDateWhen { false }
}

gradle.projectsEvaluated {
    Task previousWrite = null
    Task cleanup = rootProject.tasks.named('cleanReleaseDryRun').get()
    publicationTaskPaths.each { taskPath ->
        Task write = tasks.getByPath(taskPath)
        write.dependsOn cleanup
        if (previousWrite != null) {
            write.mustRunAfter(previousWrite)
        }
        previousWrite = write
    }
}

tasks.register(
        'verifyPublicationDryRun',
        VerifyPublicationDryRun) {
    group = 'verification'
    description = 'Verifies the exact public-module payload staged by publicationDryRun.'
    dependsOn stageReleaseDryRun
    repositoryDirectory = layout.buildDirectory.dir('release-dry-run/maven')
    releaseContract = publishedReleaseContract
    publicationVersion = project.version.toString()
    licenseFile = layout.projectDirectory.file('LICENSE')
    artifactManifest = layout.buildDirectory.file('release-evidence/artifact-manifest.tsv')
}

tasks.register('consumerSmoke', ConsumerSmokeTask) {
    group = 'verification'
    description = 'Builds and runs a clean Java 21 consumer from staged Maven artifacts only.'
    dependsOn tasks.named('publicationDryRun')
    templateDirectory = layout.projectDirectory.dir('consumer-smoke')
    repositoryDirectory = layout.buildDirectory.dir('release-dry-run/maven')
    publicationVersion = project.version.toString()
    gradleExecutable = new File(gradle.gradleHomeDir, 'bin/gradle').absolutePath
    javaHome = System.getProperty('java.home')
    scratchDirectory = layout.buildDirectory.dir('consumer-smoke')
    outputs.upToDateWhen { false }
}

tasks.register('printPublishedArtifacts', PrintPublishedArtifacts) {
    group = 'help'
    description = 'Prints the planned public Maven coordinates.'
    coordinates = publishedProjects.collect { projectPath ->
        "${project.group}:${project(projectPath).name}:${project.version}"
    }
}
