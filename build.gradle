    void expectFailure(File repository, String scenario, String tag) {
        try {
            VerifyPublicationDryRun.verifyDirectory(
                    repository, releaseContract.get(), publicationVersion.get(),
                    licenseFile.get().asFile.bytes)
        } catch (GradleException expected) {
            if (expected.message.contains("[${tag}]")) return
            throw new GradleException(
                    "Publication verifier rejected ${scenario} with wrong tag: ${expected.message}",
                    expected)
        }
        throw new GradleException("Publication verifier accepted ${scenario}")
    }

    static void rewriteChecksums(File payload) {
        [md5: 'MD5', sha1: 'SHA-1', sha256: 'SHA-256', sha512: 'SHA-512'].each {
            suffix, algorithm ->
                byte[] digest = MessageDigest.getInstance(algorithm).digest(payload.bytes)
                new File(payload.parentFile, "${payload.name}.${suffix}").setText(
                        digest.collect { String.format('%02x', it & 0xff) }.join(), 'UTF-8')
        }
    }

    File mutationVersionDirectory(File repository, String module) {
        new File(repository,
                "io/github/mundanej/${module}/${publicationVersion.get()}")
    }

    File mutationPrimary(File repository, String module, String extension) {
        File match = mutationVersionDirectory(repository, module).listFiles().find {
            it.name.endsWith(extension)
        }
        if (match == null) throw new GradleException("Missing mutation target ${module} ${extension}")
        match
    }

    File binaryJar(File repository, String module) {
        File match = mutationVersionDirectory(repository, module).listFiles().find {
            it.name.endsWith('.jar') && !it.name.contains('-sources')
                    && !it.name.contains('-javadoc')
        }
        if (match == null) throw new GradleException("Missing binary JAR mutation target ${module}")
        match
    }

    void testMissingPrimary(File source, String module, String kind) {
        File missing = new File(temporaryDir, "missing-${kind}")
        copyTree(source, missing)
        File target
        switch (kind) {
            case 'binary':
                target = binaryJar(missing, module)
                break
            case 'javadoc':
                target = mutationVersionDirectory(missing, module).listFiles().find {
                    it.name.endsWith('-javadoc.jar')
                }
                break
            case 'pom':
                target = mutationPrimary(missing, module, '.pom')
                break
            case 'module':
                target = mutationPrimary(missing, module, '.module')
                break
            default:
                throw new GradleException("Unknown primary mutation kind ${kind}")
        }
        if (target == null || !target.delete()) {
            throw new GradleException("Could not remove ${kind} mutation target")
        }
        expectFailure(missing, "missing ${kind} artifact", 'MISSING_ARTIFACT')
    }

    void mutateModule(File repository, String module, Closure mutation) {
        File metadata = mutationPrimary(repository, module, '.module')
        def model = new JsonSlurper().parse(metadata)
        mutation.call(model)
        metadata.setText(
                groovy.json.JsonOutput.prettyPrint(groovy.json.JsonOutput.toJson(model)), 'UTF-8')
        rewriteChecksums(metadata)
    }

    static void rewriteZip(
            File archive, String replacementName, byte[] replacement, String addedName) {
        File rewritten = new File(archive.parentFile, "${archive.name}.rewritten")
        ZipFile input = new ZipFile(archive)
        try {
            new ZipOutputStream(new FileOutputStream(rewritten)).withCloseable { output ->
                input.entries().each { entry ->
                    ZipEntry copy = new ZipEntry(entry.name)
                    copy.time = 0L
                    output.putNextEntry(copy)
                    if (!entry.directory) {
                        output.write(entry.name == replacementName
                                ? replacement : input.getInputStream(entry).bytes)
                    }
                    output.closeEntry()
                }
                if (addedName != null) {
                    ZipEntry added = new ZipEntry(addedName)
                    added.time = 0L
                    output.putNextEntry(added)
                    output.write('forbidden'.bytes)
                    output.closeEntry()
                }
            }
        } finally {
            input.close()
        }
        Files.move(rewritten.toPath(), archive.toPath(), StandardCopyOption.REPLACE_EXISTING)
    }

    static void writeDuplicateZip(File archive, String name, byte[] bytes) {
        byte[] nameBytes = name.getBytes(StandardCharsets.UTF_8)
        java.util.zip.CRC32 crc = new java.util.zip.CRC32()
        crc.update(bytes)
        long checksum = crc.value
        List<Integer> offsets = []
        ByteArrayOutputStream body = new ByteArrayOutputStream()
        DataOutputStream output = new DataOutputStream(body)
        2.times {
            offsets.add(body.size())
            writeLeInt(output, 0x04034b50)
            writeLeShort(output, 20)
            writeLeShort(output, 0)
            writeLeShort(output, 0)
            writeLeShort(output, 0)
            writeLeShort(output, 0)
            writeLeInt(output, checksum)
            writeLeInt(output, bytes.length)
            writeLeInt(output, bytes.length)
            writeLeShort(output, nameBytes.length)
            writeLeShort(output, 0)
            output.write(nameBytes)
            output.write(bytes)
        }
        int centralOffset = body.size()
        offsets.each { offset ->
            writeLeInt(output, 0x02014b50)
            writeLeShort(output, 20)
            writeLeShort(output, 20)
            4.times { writeLeShort(output, 0) }
            writeLeInt(output, checksum)
            writeLeInt(output, bytes.length)
            writeLeInt(output, bytes.length)
            writeLeShort(output, nameBytes.length)
            4.times { writeLeShort(output, 0) }
            writeLeInt(output, 0)
            writeLeInt(output, offset)
            output.write(nameBytes)
        }
        int centralSize = body.size() - centralOffset
        writeLeInt(output, 0x06054b50)
        2.times { writeLeShort(output, 0) }
        2.times { writeLeShort(output, 2) }
        writeLeInt(output, centralSize)
        writeLeInt(output, centralOffset)
        writeLeShort(output, 0)
        output.close()
        archive.bytes = body.toByteArray()
    }

    static void writeLeShort(DataOutputStream output, long value) {
        output.writeByte((int) (value & 0xff))
        output.writeByte((int) ((value >>> 8) & 0xff))
    }

    static void writeLeInt(DataOutputStream output, long value) {
        writeLeShort(output, value)
        writeLeShort(output, value >>> 16)
    }

    static void copyTree(File source, File destination) {
        if (destination.exists()) {
            Files.walk(destination.toPath()).withCloseable { paths ->
                paths.sorted(Comparator.reverseOrder()).forEach { Files.delete(it) }
            }
        }
        Files.walk(source.toPath()).withCloseable { paths ->
            paths.forEach { path ->
                def relative = source.toPath().relativize(path)
                def target = destination.toPath().resolve(relative)
                if (Files.isDirectory(path)) Files.createDirectories(target)
                else Files.copy(path, target, StandardCopyOption.REPLACE_EXISTING)
            }
        }
    }
}

@DisableCachingByDefault(because = 'Executes three fresh isolated downstream Gradle builds')
abstract class ConsumerSmokeTask extends DefaultTask {
    @InputDirectory
    @PathSensitive(PathSensitivity.RELATIVE)
    abstract DirectoryProperty getTemplateDirectory()

    @InputDirectory
    @PathSensitive(PathSensitivity.RELATIVE)
    abstract DirectoryProperty getRepositoryDirectory()

    @Input
    abstract Property<String> getPublicationVersion()

    @Input
    abstract Property<String> getGradleExecutable()

    @Input
    abstract Property<String> getJavaHome()

    @org.gradle.api.tasks.OutputDirectory
    abstract DirectoryProperty getScratchDirectory()

    @TaskAction
    void consume() {
        File scratch = scratchDirectory.get().asFile
        deleteTree(scratch)
        File negativeProject = new File(scratch, 'missing-repository-project')
        File wrongProject = new File(scratch, 'wrong-repository-project')
        File validProject = new File(scratch, 'valid-project')
        copyTree(templateDirectory.get().asFile, negativeProject)
        copyTree(templateDirectory.get().asFile, wrongProject)
        copyTree(templateDirectory.get().asFile, validProject)

        File negativeHome = new File(scratch, 'missing-repository-home')
        File wrongHome = new File(scratch, 'wrong-repository-home')
        File validHome = new File(scratch, 'valid-home')
        File wrongRepository = new File(scratch, 'wrong-existing-repository')
        negativeHome.mkdirs()
        wrongHome.mkdirs()
        validHome.mkdirs()
        wrongRepository.mkdirs()
        ProcessResult negative = runGradle(negativeProject, negativeHome, 'help', [])
        String invariant = 'map.consumerRepository must name an absolute existing directory'
        if (negative.exitCode == 0 || !negative.output.contains(invariant)) {
            throw new GradleException(
                    "Consumer missing-repository control failed:\n${tail(negative.output)}")
        }

        ProcessResult wrong = runGradle(
                wrongProject,
                wrongHome,
                'help',
                ["-Pmap.consumerRepository=${wrongRepository.absolutePath}",
                        "-Pmap.consumerVersion=${publicationVersion.get()}"])
        String wrongInvariant =
                'map.consumerRepository must contain the staged io.github.mundanej group'
        if (wrong.exitCode == 0 || !wrong.output.contains(wrongInvariant)) {
            throw new GradleException(
                    "Consumer wrong-repository control failed:\n${tail(wrong.output)}")
        }

        ProcessResult valid = runGradle(
                validProject,
                validHome,
                'smoke',
                ["-Pmap.consumerRepository=${repositoryDirectory.get().asFile.absolutePath}",
                        "-Pmap.consumerVersion=${publicationVersion.get()}"])
        String sentinel = 'mundane-map consumer smoke: OK'
        if (valid.exitCode != 0 || valid.output.count(sentinel) != 1) {
            throw new GradleException("Consumer smoke failed:\n${tail(valid.output)}")
        }
        println sentinel
    }

    private ProcessResult runGradle(
            File projectDirectory, File gradleHome, String taskName, List<String> properties) {
        List<String> command = [
            gradleExecutable.get(),
            '-p', projectDirectory.absolutePath,
            taskName,
            '--offline',
            '--no-daemon',
            '--no-build-cache',
            '--no-configuration-cache',
            '--no-watch-fs',
            '--console=plain',
            "--gradle-user-home=${gradleHome.absolutePath}",
            '-Dorg.gradle.java.installations.auto-download=false'
        ]
        command.addAll(properties)
        ProcessBuilder builder = new ProcessBuilder(command.collect { it.toString() })
        builder.redirectErrorStream(true)
        builder.environment().put('JAVA_HOME', javaHome.get())
        builder.environment().remove('GRADLE_OPTS')
        builder.environment().remove('JAVA_OPTS')
        Process process = builder.start()
        ByteArrayOutputStream capture = new ByteArrayOutputStream()
        Thread reader = Thread.ofVirtual().start { process.inputStream.transferTo(capture) }
        boolean exited = process.waitFor(5, java.util.concurrent.TimeUnit.MINUTES)
        if (!exited) {
            process.destroyForcibly()
            process.waitFor()
            reader.join()
            throw new GradleException("Consumer child build exceeded five minutes")
        }
        reader.join()
        new ProcessResult(process.exitValue(), capture.toString(StandardCharsets.UTF_8))
    }

    private static String tail(String output) {
        int maximum = 16 * 1024
        output.length() <= maximum ? output : output.substring(output.length() - maximum)
    }

    private static void copyTree(File source, File destination) {
        Files.walk(source.toPath()).withCloseable { paths ->
            paths.forEach { path ->
                if (Files.isSymbolicLink(path)) {
                    throw new GradleException("Consumer template contains a symbolic link: ${path}")
                }
                def relative = source.toPath().relativize(path)
                def target = destination.toPath().resolve(relative)
                if (Files.isDirectory(path)) Files.createDirectories(target)
                else Files.copy(path, target, StandardCopyOption.REPLACE_EXISTING)
            }
        }
    }

    private static void deleteTree(File directory) {
        if (!directory.exists()) return
        Files.walk(directory.toPath()).withCloseable { paths ->
            paths.sorted(Comparator.reverseOrder()).forEach { Files.delete(it) }
        }
    }

    private static record ProcessResult(int exitCode, String output) {}
}

@DisableCachingByDefault(because = 'Runs isolated parallel/repeat publication child builds')
abstract class TestPublicationDryRunFunctional extends DefaultTask {
    @org.gradle.api.tasks.Internal
    abstract DirectoryProperty getSourceDirectory()

    @org.gradle.api.tasks.Internal
    abstract DirectoryProperty getGradleUserHome()

    @Input
    abstract Property<String> getGradleExecutable()

    @Input
    abstract Property<String> getJavaHome()

    @org.gradle.api.tasks.OutputDirectory
    abstract DirectoryProperty getScratchDirectory()

    @TaskAction
    void verifyFunctionalStaging() {
        File scratch = scratchDirectory.get().asFile
        deleteTree(scratch)
        File workspace = new File(scratch, 'workspace')
        copyWorkspace(sourceDirectory.get().asFile, workspace)
        String snapshotVersion = '0.1.0-SNAPSHOT'
        2.times { iteration ->
            File sentinel = new File(workspace,
                    'build/release-dry-run/maven/stale-publication-sentinel')
            sentinel.parentFile.mkdirs()
            sentinel.text = "stale-${iteration}"
            runChild(workspace, ['verifyPublicationDryRun',
                    "-Pmap.version=${snapshotVersion}"])
            assertComplete(workspace, snapshotVersion, sentinel)
        }
        String releaseVersion = '0.1.0-functional'
        runChild(workspace, ['testPublicationDryRunVerifier',
                "-Pmap.version=${releaseVersion}"])
        assertComplete(workspace, releaseVersion, null)
    }

    void runChild(File workspace, List<String> requested) {
        List<String> command = [gradleExecutable.get(), '-p', workspace.absolutePath]
        command.addAll(requested)
        command.addAll(['--parallel', '--no-daemon', '--no-build-cache',
                '--no-configuration-cache', '--no-watch-fs', '--console=plain'])
        ProcessBuilder builder = new ProcessBuilder(command.collect { it.toString() })
        builder.redirectErrorStream(true)
        builder.environment().put('JAVA_HOME', javaHome.get())
        builder.environment().put('GRADLE_USER_HOME', gradleUserHome.get().asFile.absolutePath)
        Process process = builder.start()
        ByteArrayOutputStream capture = new ByteArrayOutputStream()
        Thread reader = Thread.ofVirtual().start { process.inputStream.transferTo(capture) }
        boolean exited = process.waitFor(10, java.util.concurrent.TimeUnit.MINUTES)
        if (!exited) {
            process.destroyForcibly()
            process.waitFor()
            reader.join()
            throw new GradleException('Publication functional child exceeded ten minutes')
        }
        reader.join()
        String output = capture.toString(StandardCharsets.UTF_8)
        if (process.exitValue() != 0) {
            int start = Math.max(0, output.length() - 16 * 1024)
            throw new GradleException(
                    "Publication functional child failed:\n${output.substring(start)}")
        }
    }

    static void assertComplete(File workspace, String version, File sentinel) {
        if (sentinel != null && sentinel.exists()) {
            throw new GradleException('Publication cleanup retained the stale sentinel')
        }
        File group = new File(workspace,
                'build/release-dry-run/maven/io/github/mundanej')
        Set<String> expected = ['mundane-map-api', 'mundane-map-core', 'mundane-map-awt',
                'mundane-map-io-shapefile', 'mundane-map-io-image',
                'mundane-map-io-dted'] as Set
        Set<String> actual = group.listFiles() == null
                ? [] as Set : group.listFiles().findAll { it.isDirectory() }
                        .collect { it.name } as Set
        if (actual != expected) {
            throw new GradleException(
                    "Publication functional coordinates: expected ${expected}, found ${actual}")
        }
        expected.each { module ->
            if (!new File(group, "${module}/${version}").isDirectory()) {
                throw new GradleException(
                        "Publication functional version missing: ${module}:${version}")
            }
        }
    }

    static void copyWorkspace(File source, File destination) {
        def sourcePath = source.toPath()
        Files.walk(sourcePath).withCloseable { paths ->
            paths.forEach { path ->
                def relative = sourcePath.relativize(path)
                List<String> segments = []
                relative.forEach { segments.add(it.toString()) }
                if (segments.any { it == '.git' || it == '.gradle' || it == 'build' }) return
                if (Files.isSymbolicLink(path)) {
                    throw new GradleException("Publication workspace contains symlink: ${relative}")
                }
                def target = destination.toPath().resolve(relative)
                if (Files.isDirectory(path)) Files.createDirectories(target)
                else Files.copy(path, target, StandardCopyOption.REPLACE_EXISTING)
            }
        }
    }

    static void deleteTree(File directory) {
        if (!directory.exists()) return
        Files.walk(directory.toPath()).withCloseable { paths ->
            paths.sorted(Comparator.reverseOrder()).forEach { Files.delete(it) }
        }
    }
}

