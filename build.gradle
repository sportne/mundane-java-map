import org.gradle.api.file.DirectoryProperty
import org.gradle.api.file.RegularFileProperty
import org.gradle.api.provider.ListProperty
import org.gradle.api.provider.Property
import org.gradle.api.tasks.Input
import org.gradle.api.tasks.InputDirectory
import org.gradle.api.tasks.InputFile
import org.gradle.api.tasks.OutputFile
import org.gradle.api.tasks.PathSensitive
import org.gradle.api.tasks.PathSensitivity
import org.gradle.api.tasks.TaskAction
import org.gradle.work.DisableCachingByDefault
import groovy.json.JsonSlurper
import java.nio.charset.StandardCharsets
import java.nio.file.Files
import java.nio.file.StandardCopyOption
import java.security.MessageDigest
import java.util.zip.ZipEntry
import java.util.zip.ZipFile
import java.util.zip.ZipOutputStream
import javax.xml.XMLConstants
import javax.xml.parsers.DocumentBuilderFactory

plugins {
    id 'base'
}

group = 'io.github.mundanej'
version = providers.gradleProperty('map.version').getOrElse('0.1.0-SNAPSHOT')

allprojects {
    group = rootProject.group
    version = rootProject.version
}

@DisableCachingByDefault(because = 'Verification reads a freshly staged local repository')
abstract class VerifyPublicationDryRun extends DefaultTask {
    @InputDirectory
    @PathSensitive(PathSensitivity.RELATIVE)
    abstract DirectoryProperty getRepositoryDirectory()

    @Input
    abstract ListProperty<String> getReleaseContract()

    @Input
    abstract Property<String> getPublicationVersion()

    @InputFile
    @PathSensitive(PathSensitivity.RELATIVE)
    abstract RegularFileProperty getLicenseFile()

    @OutputFile
    abstract RegularFileProperty getArtifactManifest()

    @TaskAction
    void verifyRepository() {
        List<String> rows = verifyDirectory(
                repositoryDirectory.get().asFile,
                releaseContract.get(),
                publicationVersion.get(),
                licenseFile.get().asFile.bytes)
        File manifest = artifactManifest.get().asFile
        manifest.parentFile.mkdirs()
        manifest.setText(rows.join('\n') + '\n', 'UTF-8')
    }

    static List<String> verifyDirectory(
            File repository, Collection<String> contractRows, String version, byte[] license) {
        Map<String, Map<String, Object>> contract = parseContract(contractRows)
        verifyExactChildren(repository, ['io'])
        verifyExactChildren(new File(repository, 'io'), ['github'])
        verifyExactChildren(new File(repository, 'io/github'), ['mundanej'])
        File groupDirectory = new File(repository, 'io/github/mundanej')
        Set<String> expectedModules = contract.keySet()
        Set<String> actualModules = childNames(groupDirectory)
        if (actualModules != expectedModules) {
            fail('UNEXPECTED_COORDINATE', groupDirectory,
                    "expected ${expectedModules.sort()}, found ${actualModules.sort()}")
        }

        List<String> manifestRows = []
        for (String moduleName : contract.keySet()) {
            File moduleDirectory = new File(groupDirectory, moduleName)
            verifyFilesAndChecksums(moduleDirectory, ['maven-metadata.xml'], [version])
            verifyModuleMetadata(
                    new File(moduleDirectory, 'maven-metadata.xml'), moduleName, version)

            File versionDirectory = new File(moduleDirectory, version)
            Map<String, String> payloadByKind = primaryPayloads(versionDirectory, moduleName, version)
            Set<String> payloads = payloadByKind.values() as Set
            Set<String> otherPayloads = version.endsWith('-SNAPSHOT')
                    ? ['maven-metadata.xml'] as Set : [] as Set
            verifyFilesAndChecksums(versionDirectory, payloads + otherPayloads, [])

            Map<String, Object> row = contract.get(moduleName)
            File pom = new File(versionDirectory, payloadByKind.pom)
            File module = new File(versionDirectory, payloadByKind.module)
            verifyPom(pom, moduleName, version, row)
            verifyArchive(new File(versionDirectory, payloadByKind.binary), moduleName, 'binary',
                    row.packageRoot as String, license)
            verifyArchive(new File(versionDirectory, payloadByKind.sources), moduleName, 'sources',
                    row.packageRoot as String, license)
            verifyArchive(new File(versionDirectory, payloadByKind.javadoc), moduleName, 'javadoc',
                    row.packageRoot as String, license)
            verifyGradleModule(module, versionDirectory, payloadByKind, moduleName, version, row)

            payloads.sort().each { payloadName ->
                [payloadName, "${payloadName}.md5", "${payloadName}.sha1",
                        "${payloadName}.sha256", "${payloadName}.sha512"].each { fileName ->
                    File artifact = new File(versionDirectory, fileName)
                    String relative = repository.toPath().relativize(artifact.toPath())
                            .toString().replace(File.separatorChar, '/' as char)
                    manifestRows.add("${relative}\t${artifact.length()}\t${digest(artifact, 'SHA-256')}")
                }
            }
        }
        manifestRows.sort()
    }

    private static Map<String, Map<String, Object>> parseContract(Collection<String> rows) {
        Map<String, Map<String, Object>> parsed = new LinkedHashMap<>()
        rows.each { row ->
            String[] fields = row.split('\\|', -1)
            if (fields.length != 5 || parsed.containsKey(fields[0])) {
                fail('INVALID_CONTRACT', new File('.'), row)
            }
            parsed.put(fields[0], [
                compile: splitValues(fields[1]),
                runtime: splitValues(fields[2]),
                packageRoot: fields[3],
                description: fields[4]
            ])
        }
        parsed
    }

    private static List<String> splitValues(String value) {
        value.isEmpty() ? [] : value.split(',').toList()
    }

    private static Set<String> childNames(File parent) {
        File[] children = parent.listFiles()
        return children == null ? [] as Set : children.collect { it.name } as Set
    }

    private static void verifyExactChildren(File parent, Collection<String> expectedNames) {
        Set<String> expected = expectedNames as Set
        Set<String> actual = childNames(parent)
        if (actual != expected) {
            fail('UNEXPECTED_STAGED_FILE', parent,
                    "expected ${expected.sort()}, found ${actual.sort()}")
        }
    }

    private static void verifyModuleMetadata(
            File metadata, String moduleName, String version) {
        def document = parseMetadata(metadata)
        def versionNodes = document.getElementsByTagName('version')
        Set<String> versions = [] as Set
        for (int index = 0; index < versionNodes.length; index++) {
            versions.add(versionNodes.item(index).textContent.trim())
        }
        if (text(document, 'groupId') != 'io.github.mundanej'
                || text(document, 'artifactId') != moduleName
                || text(document, 'latest') != version
                || versions != ([version] as Set)) {
            fail('VERSION_MISMATCH', metadata, 'incorrect repository metadata identity')
        }
    }

    private static Map<String, String> primaryPayloads(
            File directory, String module, String version) {
        if (!version.endsWith('-SNAPSHOT')) {
            return [binary: "${module}-${version}.jar", sources: "${module}-${version}-sources.jar",
                    javadoc: "${module}-${version}-javadoc.jar", pom: "${module}-${version}.pom",
                    module: "${module}-${version}.module"]
        }
        File metadata = new File(directory, 'maven-metadata.xml')
        Map<String, String> snapshots = snapshotValues(metadata, module, version)
        Map<String, String> result = [
            binary: "${module}-${snapshots.get('|jar')}.jar",
            sources: "${module}-${snapshots.get('sources|jar')}-sources.jar",
            javadoc: "${module}-${snapshots.get('javadoc|jar')}-javadoc.jar",
            pom: "${module}-${snapshots.get('|pom')}.pom",
            module: "${module}-${snapshots.get('|module')}.module"
        ]
        result
    }

    private static Map<String, String> snapshotValues(
            File metadata, String moduleName, String version) {
        def document = parseMetadata(metadata)
        if (text(document, 'groupId') != 'io.github.mundanej'
                || text(document, 'artifactId') != moduleName
                || text(document, 'version') != version) {
            fail('VERSION_MISMATCH', metadata, 'incorrect snapshot metadata identity')
        }
        String timestamp = text(document, 'timestamp')
        String build = text(document, 'buildNumber')
        if (!(timestamp ==~ /[0-9]{8}\.[0-9]{6}/)
                || !(build ==~ /[1-9][0-9]*/)) {
            fail('INVALID_METADATA', metadata, 'snapshot timestamp/buildNumber')
        }
        String base = version.substring(0, version.length() - '-SNAPSHOT'.length())
        String expectedValue = "${base}-${timestamp}-${build}"
        Set<String> expectedTuples = [
            '|jar', 'sources|jar', 'javadoc|jar', '|pom', '|module'
        ] as Set
        Map<String, String> values = new LinkedHashMap<>()
        def entries = document.getElementsByTagName('snapshotVersion')
        for (int index = 0; index < entries.length; index++) {
            def entry = entries.item(index)
            String classifier = childText(entry, 'classifier')
            String extension = childText(entry, 'extension')
            String value = childText(entry, 'value')
            String tuple = "${classifier}|${extension}"
            if (!expectedTuples.contains(tuple) || values.containsKey(tuple)
                    || value != expectedValue) {
                fail('INCOHERENT_SNAPSHOT', metadata,
                        "tuple=${tuple}, value=${value}, expected=${expectedValue}")
            }
            String updated = childText(entry, 'updated')
            if (updated && updated != timestamp.replace('.', '')) {
                fail('INCOHERENT_SNAPSHOT', metadata, "updated=${updated}")
            }
            values.put(tuple, value)
        }
        if (values.keySet() != expectedTuples) {
            fail('UNEXPECTED_CLASSIFIER', metadata,
                    "expected ${expectedTuples.sort()}, found ${values.keySet().sort()}")
        }
        values
    }

    private static def parseMetadata(File metadata) {
        if (!metadata.isFile()) {
            fail('MISSING_ARTIFACT', metadata, 'snapshot metadata')
        }
        try {
            DocumentBuilderFactory factory = DocumentBuilderFactory.newInstance()
            factory.setNamespaceAware(true)
            factory.setFeature('http://apache.org/xml/features/disallow-doctype-decl', true)
            factory.setFeature('http://xml.org/sax/features/external-general-entities', false)
            factory.setFeature('http://xml.org/sax/features/external-parameter-entities', false)
            factory.setAttribute(XMLConstants.ACCESS_EXTERNAL_DTD, '')
            factory.setAttribute(XMLConstants.ACCESS_EXTERNAL_SCHEMA, '')
            return factory.newDocumentBuilder().parse(metadata)
        } catch (Exception exception) {
            throw new GradleException("[INVALID_METADATA] ${metadata}", exception)
        }
    }

    private static String text(def document, String name) {
        def nodes = document.getElementsByTagName(name)
        return nodes.length == 0 ? '' : nodes.item(0).textContent.trim()
    }

    private static String childText(def element, String name) {
        def children = element.getElementsByTagName(name)
        return children.length == 0 ? '' : children.item(0).textContent.trim()
    }

    private static List directElements(def element, String expectedName = null) {
        List result = []
        def children = element.childNodes
        for (int index = 0; index < children.length; index++) {
            def child = children.item(index)
            if (child.nodeType == org.w3c.dom.Node.ELEMENT_NODE
                    && (expectedName == null || elementName(child) == expectedName)) {
                result.add(child)
            }
        }
        result
    }

    private static def directElement(def element, String name) {
        List matches = directElements(element, name)
        if (matches.size() != 1) {
            throw new GradleException("[INVALID_METADATA] expected one direct ${name}")
        }
        matches.first()
    }

    private static String directText(def element, String name) {
        directElement(element, name).textContent.trim()
    }

    private static Set<String> directElementNames(def element) {
        directElements(element).collect { elementName(it) } as Set
    }

    private static String elementName(def element) {
        element.localName ?: element.nodeName
    }

    private static void verifyFilesAndChecksums(
            File directory,
            Collection<String> baseNames,
            Collection<String> expectedDirectories) {
        Set<String> expected = expectedDirectories as Set
        baseNames.each { name ->
            expected.add(name)
            ['md5', 'sha1', 'sha256', 'sha512'].each { expected.add("${name}.${it}") }
        }
        Set<String> actual = directory.listFiles() == null
                ? [] as Set
                : directory.listFiles().collect { it.name } as Set
        if (actual != expected) {
            Set<String> extra = actual - expected
            fail(extra.isEmpty() ? 'MISSING_ARTIFACT' : 'UNEXPECTED_STAGED_FILE', directory,
                    "expected ${expected.sort()}, found ${actual.sort()}")
        }
        baseNames.each { name ->
            File payload = new File(directory, name)
            [md5: 'MD5', sha1: 'SHA-1', sha256: 'SHA-256', sha512: 'SHA-512'].each {
                suffix, algorithm ->
                    String expectedDigest = new File(directory, "${name}.${suffix}").text.trim()
                    String actualDigest = digest(payload, algorithm)
                    if (actualDigest != expectedDigest) {
                        fail('CHECKSUM_MISMATCH', payload, algorithm)
                    }
            }
        }
    }

    private static void verifyPom(
            File pom, String module, String version, Map<String, Object> row) {
        String xml = pom.getText('UTF-8')
        if (forbiddenText(xml) || xml.contains('${')) {
            fail('UNEXPECTED_REPOSITORY', pom, 'forbidden metadata content')
        }
        def document = parseMetadata(pom)
        def projectElement = document.documentElement
        String pomNamespace = 'http://maven.apache.org/POM/4.0.0'
        String pomSchema = (pomNamespace
                + ' https://maven.apache.org/xsd/maven-4.0.0.xsd')
        if (elementName(projectElement) != 'project'
                || projectElement.namespaceURI != pomNamespace
                || projectElement.getAttributeNS(
                        XMLConstants.W3C_XML_SCHEMA_INSTANCE_NS_URI, 'schemaLocation') != pomSchema) {
            fail('INVALID_METADATA', pom, 'Maven project namespace/schema')
        }
        def pomElements = document.getElementsByTagName('*')
        for (int index = 0; index < pomElements.length; index++) {
            if (pomElements.item(index).namespaceURI != pomNamespace) {
                fail('INVALID_METADATA', pom, 'Maven contract element namespace')
            }
        }
        Set<String> expectedRoot = [
            'modelVersion', 'groupId', 'artifactId', 'version', 'name', 'description', 'url',
            'licenses', 'developers', 'scm'
        ] as Set
        if (!(row.compile as List).isEmpty() || !(row.runtime as List).isEmpty()) {
            expectedRoot.add('dependencies')
        }
        if ((directElements(projectElement).collect { elementName(it) } as Set) != expectedRoot
                || directElements(projectElement).size() != expectedRoot.size()) {
            fail('INVALID_METADATA', pom, 'unexpected or duplicate project element')
        }
        Map<String, String> required = [modelVersion: '4.0.0', groupId: 'io.github.mundanej',
                artifactId: module, version: version, name: module,
                url: 'https://github.com/sportne/mundane-java-map']
        required.each { name, expected ->
            if (directText(projectElement, name) != expected) {
                fail('VERSION_MISMATCH', pom, "${name}=${directText(projectElement, name)}")
            }
        }
        if (directText(projectElement, 'description') != row.description) {
            fail('INVALID_METADATA', pom, 'required project metadata')
        }
        def licensesContainer = directElement(projectElement, 'licenses')
        List licenses = directElements(licensesContainer, 'license')
        if (directElementNames(licensesContainer) != ['license'] as Set
                || directElements(licensesContainer).size() != 1 || licenses.size() != 1
                || directElementNames(licenses.first()) != ['name', 'url', 'distribution'] as Set
                || directText(licenses.first(), 'name') != 'BSD 3-Clause License'
                || directText(licenses.first(), 'url')
                        != 'https://opensource.org/license/bsd-3-clause'
                || directText(licenses.first(), 'distribution') != 'repo') {
            fail('INVALID_METADATA', pom, 'license')
        }
        def developers = directElement(projectElement, 'developers')
        List developerEntries = directElements(developers, 'developer')
        if (directElementNames(developers) != ['developer'] as Set
                || directElements(developers).size() != 1 || developerEntries.size() != 1
                || directElementNames(developerEntries.first()) != ['id'] as Set
                || directText(developerEntries.first(), 'id') != 'sportne') {
            fail('INVALID_METADATA', pom, 'developer')
        }
        def scm = directElement(projectElement, 'scm')
        if (directElementNames(scm) != ['connection', 'url'] as Set
                || directText(scm, 'connection')
                        != 'scm:git:https://github.com/sportne/mundane-java-map.git'
                || directText(scm, 'url') != 'https://github.com/sportne/mundane-java-map') {
            fail('INVALID_METADATA', pom, 'scm')
        }
        Set<String> expected = []
        (row.compile as List<String>).each { expected.add("${it}|compile|${version}") }
        (row.runtime as List<String>).each { expected.add("${it}|runtime|${version}") }
        Set<String> actual = []
        def dependenciesContainer = expected.isEmpty()
                ? null : directElement(projectElement, 'dependencies')
        List dependencies = expected.isEmpty()
                ? [] : directElements(dependenciesContainer, 'dependency')
        if (dependenciesContainer != null
                && (directElementNames(dependenciesContainer) != ['dependency'] as Set
                        || directElements(dependenciesContainer).size() != dependencies.size())) {
            fail('UNEXPECTED_DEPENDENCY', pom, 'unexpected dependency container semantics')
        }
        dependencies.each { dependency ->
            if (directElementNames(dependency)
                    != ['groupId', 'artifactId', 'version', 'scope'] as Set) {
                fail('UNEXPECTED_DEPENDENCY', pom, 'unexpected dependency semantics')
            }
            String group = directText(dependency, 'groupId')
            String artifact = directText(dependency, 'artifactId')
            String dependencyVersion = directText(dependency, 'version')
            String scope = directText(dependency, 'scope')
            if (group != 'io.github.mundanej'
                    || dependencyVersion.contains('[') || dependencyVersion.contains('(')) {
                fail('UNEXPECTED_DEPENDENCY', pom, "${group}:${artifact}:${dependencyVersion}")
            }
            actual.add("${artifact}|${scope}|${dependencyVersion}")
        }
        if (actual != expected || actual.size() != dependencies.size()) {
            fail('UNEXPECTED_DEPENDENCY', pom, "expected ${expected.sort()}, found ${actual.sort()}")
        }
    }

    private static void verifyGradleModule(
            File moduleFile, File directory, Map<String, String> payloads, String module,
            String version, Map<String, Object> row) {
        def model
        try {
            model = new JsonSlurper().parse(moduleFile)
        } catch (Exception exception) {
            throw new GradleException("[INVALID_METADATA] ${moduleFile}", exception)
        }
        if (forbiddenText(moduleFile.getText('UTF-8'))) {
            fail('UNEXPECTED_REPOSITORY', moduleFile, 'forbidden metadata content')
        }
        if (model.formatVersion != '1.1') {
            fail('INVALID_METADATA', moduleFile, "formatVersion ${model.formatVersion}")
        }
        if (model.component.group != 'io.github.mundanej' || model.component.module != module
                || model.component.version != version) {
            fail('VERSION_MISMATCH', moduleFile, 'component identity')
        }
        List variantList = model.variants ?: []
        Set<String> expectedVariantNames = [
            'apiElements', 'runtimeElements', 'sourcesElements', 'javadocElements'
        ] as Set
        List<String> variantNames = variantList.collect { it.name as String }
        if ((variantNames as Set) != expectedVariantNames
                || variantNames.size() != expectedVariantNames.size()) {
            fail('INVALID_METADATA', moduleFile, "variants ${variantNames.sort()}")
        }
        Map variants = variantList.collectEntries { [(it.name): it] }
        Map<String, Object> apiAttributes = [
            'org.gradle.category': 'library',
            'org.gradle.dependency.bundling': 'external',
            'org.gradle.jvm.version': 21,
            'org.gradle.libraryelements': 'jar',
            'org.gradle.usage': 'java-api'
        ]
        Map<String, Object> runtimeAttributes = new LinkedHashMap<>(apiAttributes)
        runtimeAttributes.'org.gradle.usage' = 'java-runtime'
        Map<String, Object> sourcesAttributes = [
            'org.gradle.category': 'documentation',
            'org.gradle.dependency.bundling': 'external',
            'org.gradle.docstype': 'sources',
            'org.gradle.usage': 'java-runtime'
        ]
        Map<String, Object> javadocAttributes = new LinkedHashMap<>(sourcesAttributes)
        javadocAttributes.'org.gradle.docstype' = 'javadoc'
        verifyVariant(moduleFile, variants.apiElements, apiAttributes,
                row.compile as List<String>, version)
        verifyVariant(moduleFile, variants.runtimeElements, runtimeAttributes,
                ((row.compile as List<String>) + (row.runtime as List<String>)).unique(), version)
        verifyVariant(moduleFile, variants.sourcesElements, sourcesAttributes, [], version)
        verifyVariant(moduleFile, variants.javadocElements, javadocAttributes, [], version)
        String binaryName = "${module}-${version}.jar"
        verifyModuleFile(moduleFile, variants.apiElements,
                new File(directory, payloads.binary), binaryName)
        verifyModuleFile(moduleFile, variants.runtimeElements,
                new File(directory, payloads.binary), binaryName)
        verifyModuleFile(moduleFile, variants.sourcesElements,
                new File(directory, payloads.sources), "${module}-${version}-sources.jar")
        verifyModuleFile(moduleFile, variants.javadocElements,
                new File(directory, payloads.javadoc), "${module}-${version}-javadoc.jar")
    }

    private static void verifyVariant(
            File file, def variant, Map<String, Object> expectedAttributes,
            List<String> expectedModules, String version) {
        Set<String> baseKeys = ['name', 'attributes', 'files'] as Set
        Set<String> actualKeys = variant.keySet() as Set
        if (!actualKeys.containsAll(baseKeys)
                || !(actualKeys - baseKeys - ['dependencies']).isEmpty()
                || variant.attributes != expectedAttributes
                || (actualKeys.contains('dependencies')
                        && (variant.dependencies ?: []).isEmpty() && expectedModules.isEmpty())) {
            fail('INVALID_METADATA', file, "variant semantics for ${variant.name}")
        }
        List dependencies = variant.dependencies ?: []
        Set<String> actual = dependencies.collect { dependency ->
            if ((dependency.keySet() as Set) != ['group', 'module', 'version'] as Set
                    || dependency.group != 'io.github.mundanej'
                    || dependency.version?.requires != version || dependency.version.size() != 1) {
                fail('UNEXPECTED_DEPENDENCY', file, dependency.toString())
            }
            dependency.module as String
        } as Set
        if (actual != (expectedModules as Set) || actual.size() != dependencies.size()) {
            fail('UNEXPECTED_DEPENDENCY', file,
                    "expected ${expectedModules.sort()}, found ${actual.sort()}")
        }
    }

    private static void verifyModuleFile(
            File metadata, def variant, File artifact, String expectedLogicalName) {
        if (variant.files == null || variant.files.size() != 1) {
            fail('INVALID_METADATA', metadata, "files for ${variant.name}")
        }
        def declared = variant.files.first()
        Set<String> expectedKeys = ['name', 'url', 'size', 'sha512', 'sha256', 'sha1', 'md5'] as Set
        if ((declared.keySet() as Set) != expectedKeys
                || declared.name != expectedLogicalName
                || declared.url != expectedLogicalName) {
            fail('INVALID_METADATA', metadata, "file identity for ${variant.name}")
        }
        if (declared.size != artifact.length()
                || declared.sha256 != digest(artifact, 'SHA-256')
                || declared.sha512 != digest(artifact, 'SHA-512')
                || declared.sha1 != digest(artifact, 'SHA-1')
                || declared.md5 != digest(artifact, 'MD5')) {
            fail('CHECKSUM_MISMATCH', metadata, variant.name as String)
        }
    }

    private static void verifyArchive(
            File archive, String module, String kind, String packageRoot, byte[] license) {
        Set<String> names = []
        ZipFile zip = new ZipFile(archive)
        try {
            def entries = zip.entries().toList()
            List<String> entryNames = entries.collect { it.name }
            if ((entryNames as Set).size() != entryNames.size()) {
                fail('FORBIDDEN_ENTRY', archive, 'duplicate ZIP entry')
            }
            entries.each { entry ->
                String name = entry.name
                names.add(name)
                validateEntryName(archive, entry)
                if (name.startsWith('META-INF/services/')
                        || name.contains('/nativeimage/') || name =~ /(?i)(test|fixture|corpus|example)/) {
                    fail('FORBIDDEN_ENTRY', archive, name)
                }
                if (kind == 'binary'
                        && !allowedCodeArchiveEntry(name, entry.directory, packageRoot, '.class')) {
                    fail('FORBIDDEN_ENTRY', archive, "unexpected binary root ${name}")
                }
                if (kind == 'sources'
                        && !allowedCodeArchiveEntry(name, entry.directory, packageRoot, '.java')) {
                    fail('FORBIDDEN_ENTRY', archive, "unexpected source root ${name}")
                }
            }
            def licenseEntry = zip.getEntry('META-INF/LICENSE')
            if (licenseEntry == null || !Arrays.equals(zip.getInputStream(licenseEntry).bytes, license)) {
                fail('LICENSE_MISMATCH', archive, 'META-INF/LICENSE')
            }
            def manifestEntry = zip.getEntry('META-INF/MANIFEST.MF')
            if (manifestEntry == null) {
                fail('FORBIDDEN_ENTRY', archive, 'missing META-INF/MANIFEST.MF')
            }
            String manifest = new String(
                    zip.getInputStream(manifestEntry).bytes, StandardCharsets.UTF_8)
            if (forbiddenManifestText(manifest)) {
                fail('UNEXPECTED_REPOSITORY', archive, 'forbidden manifest content')
            }
            if (kind == 'binary' && !names.any { it.startsWith(packageRoot) && it.endsWith('.class') }) {
                fail('FORBIDDEN_ENTRY', archive, "missing package ${packageRoot}")
            }
            if (kind == 'sources' && !names.any { it.startsWith(packageRoot) && it.endsWith('.java') }) {
                fail('FORBIDDEN_ENTRY', archive, "missing sources ${packageRoot}")
            }
            if (kind == 'javadoc'
                    && (!names.contains('index.html')
                            || !names.any { it.startsWith(packageRoot) && it.endsWith('.html') })) {
                fail('FORBIDDEN_ENTRY', archive, "incomplete Javadocs ${packageRoot}")
            }
        } finally {
            zip.close()
        }
    }

    private static boolean allowedCodeArchiveEntry(
            String name, boolean directory, String packageRoot, String suffix) {
        if (name == 'META-INF/' || name == 'META-INF/MANIFEST.MF'
                || name == 'META-INF/LICENSE') {
            return true
        }
        if (directory) return packageRoot.startsWith(name)
        if (!name.startsWith(packageRoot) || !name.endsWith(suffix)) return false
        !name.substring(packageRoot.length()).contains('/')
    }

    private static void validateEntryName(File archive, ZipEntry entry) {
        String name = entry.name
        if (name.isEmpty() || name.contains('\\') || name.startsWith('/') || name.startsWith('~')
                || name ==~ /[A-Za-z][A-Za-z0-9+.-]*:.*/
                || (!entry.directory && name.endsWith('/'))
                || (entry.directory && !name.endsWith('/'))) {
            fail('FORBIDDEN_ENTRY', archive, "unsafe ZIP path ${name}")
        }
        String segmented = entry.directory ? name.substring(0, name.length() - 1) : name
        List<String> segments = segmented.split('/', -1).toList()
        if (segments.isEmpty() || segments.any { it.isEmpty() || it == '.' || it == '..' }) {
            fail('FORBIDDEN_ENTRY', archive, "unsafe ZIP segment ${name}")
        }
    }

    private static String digest(File file, String algorithm) {
        MessageDigest value = MessageDigest.getInstance(algorithm)
        file.withInputStream { input ->
            byte[] buffer = new byte[16 * 1024]
            int count
            while ((count = input.read(buffer)) >= 0) {
                if (count > 0) value.update(buffer, 0, count)
            }
        }
        value.digest().collect { String.format('%02x', it & 0xff) }.join()
    }

    private static boolean forbiddenText(String text) {
        containsWindowsAbsolutePath(text) || java.util.regex.Pattern.compile(
                '(?i)<repositories|<distributionManagement|password|credential|secret|file:'
                        + '|project\\(|/mnt/|/home/|/tmp/|/workspace/')
                .matcher(text).find()
    }

    private static boolean containsWindowsAbsolutePath(String text) {
        for (int index = 0; index + 2 < text.length(); index++) {
            char drive = text.charAt(index)
            char separator = text.charAt(index + 2)
            boolean driveBoundary = index == 0
                    || !Character.isLetterOrDigit(text.charAt(index - 1))
            if (driveBoundary && Character.isLetter(drive) && text.charAt(index + 1) == ':'
                    && (separator == '\\' as char || separator == '/' as char)) {
                return true
            }
        }
        false
    }

    private static boolean forbiddenManifestText(String text) {
        forbiddenText(text) || text.contains('${')
                || java.util.regex.Pattern.compile(
                        '(?im)^(repository|repositories|distributionmanagement|'
                                + 'distribution-management)\\s*[:=]')
                        .matcher(text).find()
    }

    private static void fail(String tag, File file, String detail) {
        throw new GradleException("[${tag}] ${file}: ${detail}")
    }
}

