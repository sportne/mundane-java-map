name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    strategy:
      fail-fast: false
      matrix:
        java: [21, 25]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Java 21 compiler toolchain
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
      - uses: gradle/actions/setup-gradle@v4
      - name: Run quality gate
        run: ./gradlew -Pmap.testJavaVersion=${{ matrix.java }} qualityGate --console=plain

  render-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Run rendering regression lane
        run: ./gradlew renderRegression --console=plain

  shapefile-corpus:
    runs-on: ubuntu-24.04
    env:
      GRADLE_USER_HOME: /tmp/shapefile-corpus-gradle-home
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Create empty corpus Gradle home
        run: |
          rm -rf "$GRADLE_USER_HOME"
          mkdir -p "$GRADLE_USER_HOME"
      - name: Prime corpus dependencies
        run: ./gradlew primeShapefileCorpusDependencies --console=plain
      - name: Run corpus lane offline
        run: ./gradlew --offline shapefileCorpus --rerun-tasks --console=plain

  performance-evidence:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Prime performance test classes
        run: ./gradlew :modules:mundane-map-performance-tests:testClasses --console=plain
      - name: Run performance evidence offline
        run: ./gradlew --offline performanceEvidence --rerun-tasks --console=plain
      - name: Upload performance evidence
        uses: actions/upload-artifact@v4
        with:
          name: performance-evidence
          path: build/performance-evidence/evidence-v1.*
