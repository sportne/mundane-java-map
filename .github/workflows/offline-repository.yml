name: Offline Repository

on:
  pull_request:
    paths:
      - '.github/workflows/offline-repository.yml'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'
      - 'gradlew'
      - 'gradlew.bat'
      - 'gradle/**'
      - 'build-logic/**'
      - '**/*.gradle'
      - '**/*.gradle.kts'
      - '**/gradle.properties'
  push:
    branches: [main]
    paths:
      - '.github/workflows/offline-repository.yml'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'
      - 'gradlew'
      - 'gradlew.bat'
      - 'gradle/**'
      - 'build-logic/**'
      - '**/*.gradle'
      - '**/*.gradle.kts'
      - '**/gradle.properties'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  offline-repository:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Verify isolated offline repository
        run: ./gradlew offlineRepositoryVerification --console=plain
